name: parabolic-backfill

# Mirrors drendel_backfill.yml. Runs after the nightly succeeds (off when the nightly is off),
# plus manual dispatch for the one-time full-history backfill.
# 🚨 Align auth block + secret name + any pip/setup steps with your existing drendel_backfill.yml.

on:
  workflow_run:
    workflows: ["stonks-nightly"]
    types: [completed]
  workflow_dispatch:

jobs:
  backfill:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --upgrade pandas google-cloud-bigquery google-cloud-bigquery-storage

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run parabolic short compute
        run: python compute_parabolic_short.py
