name: stonks-nightly
on:
  schedule:
    - cron: "23 6 * * *"    # 1:23 AM CDT — primary (odd minute, less congested)
    - cron: "47 9 * * *"    # 4:47 AM CDT — backup (catches any skip; EOD definitely ready)
  workflow_dispatch: {}
permissions:
  contents: write            # step 0 (apply_review_actions) commits tickers.txt back to the repo
jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4    # persist-credentials defaults true -> git push works
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Write BigQuery service-account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > "$HOME/key.json"
      - name: Refresh SPX cash index (GSPC.INDX -> spx_daily)   # NEW — must precede the SQL rebuilds
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /home/runner/key.json
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python pull_spx.py
      - name: Run nightly ingestion + rebuilds
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /home/runner/key.json
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python run_nightly.py
      - name: Refresh ticker_review sheet
        if: always()
        run: curl -s "${{ secrets.SHEET_REFRESH_URL }}" >/dev/null || true
