name: stonks-nightly
on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch: {}
jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Write BigQuery service-account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > "$HOME/key.json"
      - name: Refresh SPX cash index (GSPC.INDX -> spx_daily)   # NEW — must precede the SQL rebuilds
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /home/runner/key.json
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python pull_spx.py
      - name: Run nightly ingestion + rebuilds
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /home/runner/key.json
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python run_nightly.py
