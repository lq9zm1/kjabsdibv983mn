name: pull-intraday

# Manual-only. Run from the Actions tab -> "pull-intraday" -> Run workflow.
# 🔐 EODHD token comes from the GitHub Secret EODHD_API_KEY (never hardcode in the .py).
on:
  workflow_dispatch:

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --upgrade requests pandas google-cloud-bigquery google-cloud-bigquery-storage db-dtypes

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Pull intraday
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python pull_intraday.py
