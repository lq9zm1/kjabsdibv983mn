name: realtime-bars
on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["pull-realtime"]
    types: [completed]
jobs:
  compute:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install --upgrade pandas google-cloud-bigquery google-cloud-bigquery-storage db-dtypes
      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Compute realtime bars
        run: python compute_realtime_bars.py
