name: tickers-dimension
on:
  workflow_dispatch: {}   # manual only — run from the Actions tab when needed
  # (metadata changes rarely; no nightly cron. Add a weekly schedule later if wanted:)
  # schedule:
  #   - cron: "0 8 * * 0"   # Sundays 08:00 UTC
jobs:
  tickers:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Write BigQuery service-account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > "$HOME/key.json"
      - name: Run tickers metadata pull
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /home/runner/key.json
        run: python pull_tickers_retry.py
